<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- NAVIGATION BAR                                                -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- Fixed to the top of the viewport. Starts transparent, gets a   -->
<!-- dark blurred background on scroll (handled by script.js).      -->
<!-- z-50 keeps it above everything else.                           -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<nav
  id="navbar"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-transparent"
>
  <div class="max-w-[1200px] mx-auto px-6 sm:px-12 lg:px-16">
    <div class="flex items-center justify-between h-20">
      <!-- Monogram logo -->
      <a href="#" class="text-2xl font-semibold text-white tracking-tight"
        ><!-- Monogram logo "AH" — blood red, Cinzel display font -->
        <span
          class="font-display text-2xl font-bold tracking-[0.1em]"
          style="color: #c41e3a"
          >AH</span
        >
      </a>

      <!-- Desktop nav links — hidden on mobile, shown on md+ screens -->
      <div class="hidden md:flex items-center space-x-8">
        <a
          href="#about"
          class="link-underline text-sm font-medium text-grey hover:text-white transition-colors duration-300"
          >About</a
        >
        <a
          href="#skills"
          class="link-underline text-sm font-medium text-grey hover:text-white transition-colors duration-300"
          >Skills</a
        >
        <a
          href="#projects"
          class="link-underline text-sm font-medium text-grey hover:text-white transition-colors duration-300"
          >Projects</a
        >
        <a
          href="#experience"
          class="link-underline text-sm font-medium text-grey hover:text-white transition-colors duration-300"
          >Experience</a
        >
        <a
          href="#contact"
          class="link-underline text-sm font-medium text-grey hover:text-white transition-colors duration-300"
          >Contact</a
        >
      </div>

      <!-- Mobile hamburger button -->
      <button
        id="mobile-menu-btn"
        class="md:hidden text-white p-2"
        aria-label="Toggle menu"
      >
        <img
          data-svg="assets/svgs/menu.svg"
          class="w-6 h-6"
          id="menu-icon"
          alt="Open menu"
        />
        <img
          data-svg="assets/svgs/close.svg"
          class="w-6 h-6 hidden"
          id="close-icon"
          alt="Close menu"
        />
      </button>
    </div>
  </div>

  <!-- Mobile menu overlay — hidden by default, toggled via JS -->
  <div
    id="mobile-menu"
    class="hidden md:hidden fixed w-full min-h-screen bg-dark z-40"
  >
    <div class="flex flex-col items-center justify-center h-full space-y-8">
      <a
        href="#about"
        class="text-2xl font-medium text-white hover:text-beige transition-colors duration-300 mobile-link"
        >About</a
      >
      <a
        href="#skills"
        class="text-2xl font-medium text-white hover:text-beige transition-colors duration-300 mobile-link"
        >Skills</a
      >
      <a
        href="#projects"
        class="text-2xl font-medium text-white hover:text-beige transition-colors duration-300 mobile-link"
        >Projects</a
      >
      <a
        href="#experience"
        class="text-2xl font-medium text-white hover:text-beige transition-colors duration-300 mobile-link"
        >Experience</a
      >
      <a
        href="#contact"
        class="text-2xl font-medium text-white hover:text-beige transition-colors duration-300 mobile-link"
        >Contact</a
      >
    </div>
  </div>
</nav>

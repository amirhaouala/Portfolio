<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- HEAD — meta, fonts, Tailwind config, custom CSS                -->
<!-- ═══════════════════════════════════════════════════════════════ -->

<!-- Character encoding and responsive viewport -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta
  name="description"
  content="Amir Haouala - Fullstack Engineer based in Tunis, Tunisia"
/>
<title>Amir Haouala | Fullstack Engineer</title>

<!-- Google Fonts — loaded before anything that uses them -->
<!-- Montserrat: main page body & headings                        -->
<!-- Cinzel, Playfair Display, Space Mono, VT323, Oranienbaum:    -->
<!--   used by the Terminal section for its retro aesthetic       -->
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;500;600;700&family=Oranienbaum&family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono&family=VT323&display=swap"
  rel="stylesheet"
/>

<!-- Tailwind CSS — utility-first CSS framework, loaded from CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!--
    Tailwind configuration.
    We extend the default theme to add custom colours and fonts
    so we can use them with Tailwind utility classes throughout.
    The colour palette serves both the main portfolio sections
    (dark, beige, grey) and the Terminal section (terminal green,
    accent red/gold, dark surface colours).
  -->
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          dark: "#000000",
          "dark-secondary": "#1a1a1a",
          "dark-tertiary": "#2a2a2a",
          beige: "#c5b8a5",
          grey: "#dfdfdf",
          terminal: "#33ff00",
          danger: "#ff1a1a",
          accent: { red: "#c41e3a", gold: "#b8860b" },
        },
        fontFamily: {
          sans: ["Montserrat", "system-ui", "sans-serif"],
          display: ["Cinzel", "serif"],
          heading: ["Playfair Display", "serif"],
          body: ["Space Mono", "monospace"],
          terminal: ["VT323", "monospace"],
          accent: ["Oranienbaum", "serif"],
        },
      },
    },
  };
</script>

<!--
    Custom CSS — things Tailwind can't do alone:
    - Keyframe animations (fade-up, bounce, cursor blink)
    - Scrollbar styling
    - Link underline hover effect
    - Card hover transitions
    - Scroll-reveal visibility toggles
    - CRT terminal effects (scanlines, vignette)
    - Terminal entrance animation
  -->
<style>
  ::selection,
  *::selection {
    background: #c5b8a5;
    color: #000;
  }
  ::-moz-selection,
  *::-moz-selection {
    background: #c5b8a5;
    color: #000;
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* SCROLLBAR — thin, dark, with beige hover                       */
  /* ═══════════════════════════════════════════════════════════════ */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #000;
  }
  ::-webkit-scrollbar-thumb {
    background: #2a2a2a;
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #c5b8a5;
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* LINK UNDERLINE — animated line on hover                        */
  /* ═══════════════════════════════════════════════════════════════ */
  .link-underline {
    position: relative;
  }
  .link-underline::after {
    content: "";
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background-color: #c5b8a5;
    transition: width 0.3s ease-out;
  }
  .link-underline:hover::after {
    width: 100%;
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* CARD HOVER — lift and border glow on hover                     */
  /* ═══════════════════════════════════════════════════════════════ */

  /* ═══════════════════════════════════════════════════════════════ */
  /* SCROLL REVEAL — fade/slide in when scrolling into view         */
  /* ═══════════════════════════════════════════════════════════════ */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition:
      opacity 0.8s ease-out,
      transform 0.8s ease-out;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-left {
    opacity: 0;
    transform: translateX(-30px);
    transition:
      opacity 0.8s ease-out,
      transform 0.8s ease-out;
  }
  .reveal-left.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .reveal-right {
    opacity: 0;
    transform: translateX(30px);
    transition:
      opacity 0.8s ease-out,
      transform 0.8s ease-out;
  }
  .reveal-right.visible {
    opacity: 1;
    transform: translateX(0);
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* KEYFRAME ANIMATIONS                                            */
  /* ═══════════════════════════════════════════════════════════════ */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes bounce {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(10px);
    }
  }
  .animate-fade-up {
    animation: fadeUp 0.8s ease-out forwards;
  }
  .animate-bounce-slow {
    animation: bounce 2s ease-in-out infinite;
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* STAGGER DELAYS — for sequential hero text entrance             */
  /* ═══════════════════════════════════════════════════════════════ */
  .stagger-2 {
    animation-delay: 0.15s;
    opacity: 0;
  }
  .stagger-3 {
    animation-delay: 0.3s;
    opacity: 0;
  }
  .stagger-4 {
    animation-delay: 0.45s;
    opacity: 0;
  }
  .stagger-5 {
    animation-delay: 0.6s;
    opacity: 0;
  }
  .delay-100 {
    transition-delay: 0.1s;
  }
  .delay-200 {
    transition-delay: 0.2s;
  }
  .delay-300 {
    transition-delay: 0.3s;
  }
  .delay-400 {
    transition-delay: 0.4s;
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* PRIMARY BUTTON — outlined beige, fills on hover                */
  /* ═══════════════════════════════════════════════════════════════ */
  .btn-primary {
    border: 1px solid #c5b8a5;
    color: #c5b8a5;
    background: transparent;
    padding: 1rem 2rem;
    transition: all 0.3s;
  }
  .btn-primary:hover {
    background: #c5b8a5;
    color: #000;
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* CRT TERMINAL EFFECTS                                           */
  /* ═══════════════════════════════════════════════════════════════ */

  /* Blinking block cursor — the green rectangle after typed text */
  @keyframes blink {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0;
    }
  }
  .cursor-blink {
    display: inline-block;
    width: 10px;
    height: 18px;
    background: #33ff00;
    animation: blink 1.06s step-end infinite;
    vertical-align: middle;
  }

  /*
      CRT scanline overlay — horizontal dark lines that make the
      terminal look like an old CRT monitor.
    */
  .crt-overlay::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
  }

  /*
      Vignette — darkens the edges of the terminal section,
      drawing the eye toward the center.
    */
  .crt-overlay::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(0, 0, 0, 0.6) 100%
    );
  }

  /*
      Terminal entrance animation — starts slightly scaled down
      and invisible, then grows and fades in when scrolled into view.
      The .active class is added by JavaScript (IntersectionObserver).
    */
  .terminal-entrance {
    opacity: 0;
    transform: scale(0.95);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .terminal-entrance.active {
    opacity: 1;
    transform: scale(1);
  }

  /*
      Terminal social buttons — green outline by default,
      fill with green and turn text black on hover.
    */
  .terminal-btn {
    transition: all 0.2s ease;
  }
  .terminal-btn:hover {
    background-color: #33ff00;
    color: #000000;
  }

  /* ═══════════════════════════════════════════════════════════════ */
  /* ACCESSIBILITY — respect user's motion preferences              */
  /* ═══════════════════════════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
